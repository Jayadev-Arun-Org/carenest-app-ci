name: 'Application CI/CD'

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  code-quality-and-security:
    name: 'SonarQube & Snyk SAST'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: |
          cd CareNest/frontend && npm install
          cd ../services/ai && npm install
          cd ../appointment && npm install
          cd ../auth && npm install
          cd ../notify && npm install
          cd ../pharmacy && npm install

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=jayadev-arun-org
            -Dsonar.projectKey=Jayadev-Arun-Org_carenest-app-ci

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          args: --all-projects --exclude=CareNest/services/aiops

  build-and-push:
    name: 'Build, Scan, Push'
    runs-on: ubuntu-latest
    needs: code-quality-and-security
    if: github.ref == 'refs/heads/master'
    strategy:
      matrix:
        service: ['frontend', 'services/ai', 'services/aiops', 'services/appointment', 'services/auth', 'services/notify', 'services/pharmacy']
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set service name
        id: svc
        run: |
          echo "svc_name=$(basename ${{ matrix.service }})" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: docker build -t jdcarenestnewacr.azurecr.io/${{ steps.svc.outputs.svc_name }}:${{ github.sha }} ./CareNest/${{ matrix.service }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'jdcarenestnewacr.azurecr.io/${{ steps.svc.outputs.svc_name }}:${{ github.sha }}'
          format: 'table'
          exit-code: '0' # Set to 1 to fail build on high/critical
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Azure Container Registry Login
        uses: azure/docker-login@v1
        with:
          login-server: jdcarenestnewacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Tag and Push
        run: |
          docker tag jdcarenestnewacr.azurecr.io/${{ steps.svc.outputs.svc_name }}:${{ github.sha }} jdcarenestnewacr.azurecr.io/${{ steps.svc.outputs.svc_name }}:latest
          docker push jdcarenestnewacr.azurecr.io/${{ steps.svc.outputs.svc_name }}:${{ github.sha }}
          docker push jdcarenestnewacr.azurecr.io/${{ steps.svc.outputs.svc_name }}:latest

  trigger-cd:
    name: 'Trigger ArgoCD Update'
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Trigger Helm Repository Update
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.PAT_TOKEN }}
          repository: Jayadev-Arun-Org/carenest-helm-cd
          event-type: update-images
          client-payload: '{"image_tag": "${{ github.sha }}"}'

      - name: Pipeline Status Notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow,job,took
          text: 'Application CI/CD Pipeline finished with status: ${{ job.status }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
